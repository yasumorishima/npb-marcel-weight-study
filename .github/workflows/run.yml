name: Optimize Marcel Weights
# Marcel weight grid search: w0/w1/w2 over NPB 2019-2025

on:
  workflow_dispatch:
    inputs:
      memo:
        description: 'この実行の意図（必須）'
        required: true
        type: string
jobs:
  optimize:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas numpy

      - name: Run weight optimization
        run: python optimize_weights.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git diff --cached --quiet || git commit -m "add weight optimization results"
          git push

      - name: Notify Discord (success)
        if: success()
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"content": "✅ **npb-marcel-weight-study** 完了\nグリッドサーチ + ブートストラップ終了。results/ を確認してください。\nhttps://github.com/yasumorishima/npb-marcel-weight-study/actions/runs/${{ github.run_id }}"}'

      - name: Notify Discord (failure)
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"content": "❌ **npb-marcel-weight-study** 失敗\nhttps://github.com/yasumorishima/npb-marcel-weight-study/actions/runs/${{ github.run_id }}"}'
